<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Quên mật khẩu — đặt lại mật khẩu qua email."
    />
    <title>Quên mật khẩu — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body class="page page--forgot">
    <header class="header header--home">
      <div class="container header__inner">
        <nav class="navbar" aria-label="Primary">
          <input
            type="checkbox"
            class="navbar__toggle"
            id="navbar-toggle"
          />
          <div class="navbar__left">
            <a class="navbar__logo" href="home.html">Portfolio</a>
          </div>
          <div class="navbar__center">
            <ul class="navbar__list">
              <li class="navbar__item">
                <a class="navbar__link" href="#">Thông tin cá nhân</a>
              </li>
              <li class="navbar__item">
                <a class="navbar__link" href="#">Tìm ứng viên</a>
              </li>
              <li class="navbar__item">
                <a class="navbar__link" href="#">Mẫu portfolio</a>
              </li>
            </ul>
          </div>
          <div class="navbar__right">
            <div class="navbar__auth" data-navbar-auth>
              <a class="btn btn--ghost navbar__auth-btn" href="login.html"
                >Đăng nhập</a
              >
              <a class="btn btn--primary navbar__auth-btn" href="register.html"
                >Đăng ký</a
              >
            </div>
            <div class="navbar__account" data-navbar-user-wrap hidden>
              <div class="navbar__user" data-navbar-user>
                <button
                  type="button"
                  class="navbar__user-trigger"
                  id="user-menu-button"
                  aria-expanded="false"
                  aria-haspopup="true"
                  aria-controls="user-menu-dropdown"
                >
                  <img
                    class="navbar__avatar"
                    src=""
                    alt=""
                    width="32"
                    height="32"
                  />
                  <span class="navbar__user-name"></span>
                  <span class="navbar__user-chevron" aria-hidden="true"></span>
                </button>
                <ul
                  class="navbar__dropdown"
                  id="user-menu-dropdown"
                  role="menu"
                  aria-labelledby="user-menu-button"
                  aria-hidden="true"
                >
                  <li class="navbar__dropdown-item" role="none">
                    <a class="navbar__dropdown-link" href="#" role="menuitem"
                      >Thông tin cá nhân</a
                    >
                  </li>
                  <li class="navbar__dropdown-item" role="none">
                    <a class="navbar__dropdown-link" href="#" role="menuitem"
                      >Đăng xuất</a
                    >
                  </li>
                </ul>
              </div>
            </div>
            <label class="navbar__toggle-label" for="navbar-toggle"
              >Menu</label
            >
          </div>
        </nav>
      </div>
    </header>

    <main class="page__main">
      <section class="forgot" aria-labelledby="forgot-title">
        <div class="forgot__container">
          <div class="forgot__grid">
            <div class="forgot__form-wrap">
              <h1 class="forgot__title" id="forgot-title">Quên mật khẩu</h1>
              <p class="forgot__sub">Nhập email để đặt lại mật khẩu</p>
              <form class="forgot__form" action="#" method="post">
                <label class="forgot__label" for="forgot-email"
                  >Email</label
                >
                <input
                  class="forgot__input"
                  type="email"
                  name="email"
                  id="forgot-email"
                  placeholder="your@email.com"
                  autocomplete="email"
                  required
                />
                <button class="forgot__button" type="submit">
                  Gửi email
                </button>
              </form>
              <a class="forgot__back" href="login.html"
                >← Quay lại đăng nhập</a
              >
            </div>
            <aside class="forgot__decor">
              <span class="forgot__decor-zone">ZONE</span>
              <span class="forgot__decor-brand">Portfolio.com</span>
              <span class="forgot__shape forgot__shape--1" aria-hidden="true"></span>
              <span class="forgot__shape forgot__shape--2" aria-hidden="true"></span>
              <span class="forgot__shape forgot__shape--3" aria-hidden="true"></span>
              <span class="forgot__rec">REC</span>
            </aside>
          </div>
        </div>
      </section>
    </main>

    <script src="../scripts/home.js" defer></script>
  </body>
</html>
