<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tìm ứng viên — bộ lọc từ khóa."
    />
    <title>Tìm ứng viên — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/pages/candidate-search.css" />
  </head>
  <body class="page--candidate-search">
    <div class="page--candidate-search__bg" aria-hidden="true"></div>

    <header class="cs-header">
      <div class="cs-header__inner">
        <a class="cs-logo" href="home.html">Portfolio</a>
        <nav class="cs-nav" aria-label="Điều hướng chính">
          <a class="cs-nav__link" href="personal-info.html">Thông tin cá nhân</a>
          <a class="cs-nav__link cs-nav__link--active" href="candidate-search.html" aria-current="page"
            >Tìm ứng viên</a
          >
          <a class="cs-nav__link" href="cinematic.html">Mẫu Portfolio</a>
          <button type="button" class="cs-btn-logout">Đăng xuất</button>
        </nav>
      </div>
    </header>

    <main class="cs-main">
      <div class="cs-card">
        <h1 class="cs-card__title">Từ khóa</h1>
        <form class="cs-form" action="candidate-results.html" method="get">
          <div class="cs-form__grid">
            <div class="cs-field">
              <label class="cs-field__label" for="profile-keyword">Nội dung hồ sơ</label>
              <input
                class="cs-input"
                id="profile-keyword"
                name="q"
                type="search"
                placeholder="Nhập từ khóa"
                autocomplete="off"
              />
              <div class="cs-field__radios">
                <label
                  ><input type="radio" name="search_in" value="content" checked />
                  Tìm nội dung hồ sơ</label
                >
                <label
                  ><input type="radio" name="search_in" value="title" /> Chức danh vị
                  trí</label
                >
              </div>
            </div>
            <div class="cs-field">
              <label class="cs-field__label" for="industry">Ngành nghề</label>
              <select class="cs-select" id="industry" name="industry">
                <option value="">Tất cả ngành nghề</option>
                <option value="it">Công nghệ thông tin</option>
                <option value="design">Thiết kế</option>
              </select>
            </div>
            <div class="cs-field">
              <label class="cs-field__label" for="location">Địa điểm</label>
              <select class="cs-select" id="location" name="location">
                <option value="">Tất cả địa điểm</option>
                <option value="hcm">TP. Hồ Chí Minh</option>
                <option value="hn">Hà Nội</option>
              </select>
            </div>
            <div class="cs-field">
              <label class="cs-field__label" for="date-preset">Ngày truy cập / Cập nhật</label>
              <select class="cs-select" id="date-preset" name="date">
                <option value="1">Ngày 1</option>
                <option value="7">7 ngày</option>
                <option value="30">30 ngày</option>
              </select>
              <div class="cs-field__radios">
                <label
                  ><input type="radio" name="date_type" value="visit" checked /> Tìm Ngày
                  truy cập</label
                >
                <label
                  ><input type="radio" name="date_type" value="updated" /> Ngày cập nhật</label
                >
              </div>
            </div>
            <div class="cs-field">
              <label class="cs-field__label" for="job-status">Trạng thái tìm việc</label>
              <select class="cs-select" id="job-status" name="status">
                <option value="">Tất cả</option>
                <option value="open">Đang tìm việc</option>
                <option value="closed">Không tìm việc</option>
              </select>
            </div>
          </div>
          <div class="cs-form__actions">
            <button type="submit" class="cs-btn-submit">Tìm</button>
            <a class="cs-link-advanced" href="#">Tìm kiếm nâng cao</a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
