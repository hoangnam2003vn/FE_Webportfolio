name: CD Deploy

on:
  workflow_run:
    workflows: ["CI HTML CSS Project"] 
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/html-css-app:latest
            docker stop html-css-app || true
            docker rm html-css-app || true
            docker run -d -p 80:80 --name html-css-app ${{ secrets.DOCKER_USERNAME }}/html-css-app:latest
